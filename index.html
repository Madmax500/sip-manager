<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>SIP Manager</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>
body{
font-family:Arial;
background:#0b1320;
color:white;
text-align:center;
}

.container{
width:90%;
margin:auto;
}

.card{
background:#1c2333;
padding:15px;
margin:10px;
border-radius:12px;
}

input{
padding:8px;
margin:5px;
width:130px;
border-radius:6px;
border:none;
}

button{
padding:10px;
background:#00c853;
border:none;
color:white;
border-radius:6px;
}

h1{
margin-top:20px;
}
</style></head><body><h1>SIP Manager</h1><div class="container"><div class="card">
<h3>Add Fund</h3><input id="fundName" placeholder="Fund name">
<input id="sipAmount" placeholder="Monthly SIP"><button onclick="addFund()">Add Fund</button>

</div><div class="card">
<h3>Total Monthly SIP</h3>
<h2 id="totalSip">₹0</h2>
</div><div class="card">
<h3>SIP Future Value</h3><input id="years" placeholder="Years">
<input id="returnRate" placeholder="Return %"><button onclick="calculateFuture()">Calculate</button>

<h2 id="futureValue"></h2></div><div class="card">
<h3>Portfolio Allocation</h3><canvas id="chart"></canvas>

</div></div><script>

let funds = JSON.parse(localStorage.getItem("funds")) || [];

function addFund(){

let name=document.getElementById("fundName").value;
let amount=parseInt(document.getElementById("sipAmount").value);

funds.push({name,amount});

localStorage.setItem("funds",JSON.stringify(funds));

update();

}

function update(){

let total=0;
let labels=[];
let data=[];

funds.forEach(f=>{
total+=f.amount;
labels.push(f.name);
data.push(f.amount);
});

document.getElementById("totalSip").innerText="₹"+total;

drawChart(labels,data);

}

function drawChart(labels,data){

new Chart(document.getElementById("chart"),{
type:"pie",
data:{
labels:labels,
datasets:[{
data:data
}]
}
});

}

function calculateFuture(){

let sip=parseInt(document.getElementById("totalSip").innerText.replace("₹",""));

let years=parseInt(document.getElementById("years").value);

let rate=parseFloat(document.getElementById("returnRate").value)/100/12;

let months=years*12;

let future=sip*((Math.pow(1+rate,months)-1)/rate)*(1+rate);

document.getElementById("futureValue").innerText="Future Value ₹"+Math.round(future);

}

update();

</script></body>
</html>
