<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0B1520">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SIP Manager">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<title>My SIP Manager</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  min-height:100vh;
  background:#0B1520;
  font-family:Georgia,'Times New Roman',serif;
  color:#F0EDE8; padding:14px; padding-bottom:50px;
}
@keyframes slideUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
 100%{background-position:200% center} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes pop { 0%{transform:scale(0.92)} 100%{transform:scale(1)} }

/* HEADER */
.hdr { text-align:center; margin-bottom:20px; animation:slideUp 0.5s ease; }
.hdr-sub { font-size:10px; letter-spacing:3px; color:#7EB8F7; text-transform:uppercase; margin-bottom:6px; }
.hdr-title {
  font-size:clamp(20px,5vw,32px); font-weight:700;
  color:#FFFFFF; margin-bottom:4px; font-weight:600;
}
.hdr-desc { font-size:12px; color:rgba(240,237,232,0.5); }

/* STAT STRIP */
.stat-strip { display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:8px; margin-bottom:18px; }
.stat-box { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.07); border-radius:10px; padding:12px 8px; text-align:center; }
.stat-box .lbl { font-size:9px; color:rgba(240,237,232,0.4); letter-spacing:1px; text-transform:uppercase; margin-bottom:4px; }
.stat-box .val { font-size:18px; font-weight:700; color:#7EB8F7; }
.stat-box .sub { font-size:9px; color:rgba(240,237,232,0.3); margin-top:2px; }

/* TABS */
.tabs { display:flex; gap:3px; background:rgba(0,0,0,0.35); border-radius:12px; padding:4px; margin-bottom:16px; }
.tab { flex:1; padding:9px 3px; border-radius:8px; border:none; cursor:pointer; font-size:11px; font-family:Georgia,serif; background:transparent; color:rgba(240,237,232,0.5); transition:all 0.2s; }
.tab.active { background:rgba(255,255,255,0.12); color:#FFFFFF; font-weight:700; border:1px solid rgba(255,255,255,0.2); }

/* FUND CARD */
.fund-card {
  background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.09);
  border-left:4px solid var(--fc); border-radius:12px; padding:13px 14px;
  margin-bottom:9px; animation:pop 0.3s ease;
}
.fc-top { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
.fc-left { flex:1; min-width:0; }
.fc-name-row { display:flex; align-items:center; gap:7px; flex-wrap:wrap; margin-bottom:3px; }
.fc-icon { font-size:18px; }
.fc-name { font-weight:700; font-size:14px; }
.fc-type { font-size:10px; color:rgba(240,237,232,0.4); margin-top:1px; }
.fc-tag { font-size:9px; font-weight:700; letter-spacing:1px; padding:2px 7px; border-radius:20px; white-space:nowrap; }
.fc-actions { display:flex; gap:6px; flex-shrink:0; }
.btn-edit, .btn-del {
  border:none; border-radius:8px; cursor:pointer; font-size:13px;
  width:32px; height:32px; display:flex; align-items:center; justify-content:center;
  transition:all 0.15s;
}
.btn-edit { background:rgba(255,255,255,0.05); color:#7EB8F7; }
.btn-edit:hover { background:rgba(91,155,213,0.3); }
.btn-del { background:rgba(178,34,34,0.2); color:#FF6B6B; }
.btn-del:hover { background:rgba(178,34,34,0.4); }
.fc-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-top:10px; }
.fc-stat { text-align:center; background:rgba(255,255,255,0.04); border-radius:8px; padding:6px 3px; }
.fc-stat .sl { font-size:9px; color:rgba(240,237,232,0.33); margin-bottom:2px; }
.fc-stat .sv { font-size:13px; font-weight:700; }
.risk-badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:10px; font-weight:700; margin-top:7px; }
.alloc-bar { margin-top:9px; }
.alloc-bar-lbl { display:flex; justify-content:space-between; font-size:9px; color:rgba(240,237,232,0.3); margin-bottom:3px; }
.bar-bg { height:4px; background:rgba(255,255,255,0.08); border-radius:3px; }
.bar-fill { height:100%; border-radius:3px; }

/* ADD FUND BUTTON */
.add-btn {
  width:100%; padding:14px; border-radius:12px; border:2px dashed rgba(91,155,213,0.3);
  background:rgba(255,255,255,0.04); color:#7EB8F7; cursor:pointer; font-size:14px;
  font-family:Georgia,serif; font-weight:700; letter-spacing:1px; margin-top:4px;
  transition:all 0.2s;
}
.add-btn:hover { background:rgba(184,134,11,0.12); border-color:rgba(91,155,213,0.5); }

/* TOTAL ROW */
.total-row { background:linear-gradient(135deg,rgba(91,155,213,0.15),rgba(10,31,61,0.8)); border:1px solid rgba(255,255,255,0.12); border-radius:12px; padding:13px 15px; margin-top:6px; }
.total-row .tl { font-weight:700; font-size:14px; color:#7EB8F7; margin-bottom:8px; }
.total-stats { display:flex; gap:14px; flex-wrap:wrap; }
.ts { text-align:center; }
.ts .tsl { font-size:9px; color:rgba(240,237,232,0.33); margin-bottom:2px; }
.ts .tsv { font-size:15px; font-weight:700; color:#7EB8F7; }

/* MODAL */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.75);
  display:flex; align-items:center; justify-content:center;
  z-index:1000; padding:16px; animation:fadeIn 0.2s ease;
}
.modal {
  background:#111D30;
  border:1px solid rgba(255,255,255,0.07); border-radius:16px;
  padding:20px; width:100%; max-width:420px;
  animation:pop 0.25s ease; max-height:90vh; overflow-y:auto;
}
.modal-title { font-size:16px; font-weight:700; color:#7EB8F7; margin-bottom:16px; }
.modal-close { float:right; background:none; border:none; color:rgba(240,237,232,0.5); font-size:20px; cursor:pointer; margin-top:-4px; }

/* FORM */
.form-group { margin-bottom:13px; }
.form-label { font-size:11px; color:rgba(240,237,232,0.5); letter-spacing:0.5px; display:block; margin-bottom:6px; }
.input-wrap { display:flex; align-items:center; }
.input-pre {
  background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.07);
  border-right:none; border-radius:9px 0 0 9px;
  padding:11px 12px; font-size:14px; color:#7EB8F7; font-weight:700;
  font-family:Georgia,serif; white-space:nowrap; color:rgba(255,255,255,0.5);
}
.input-suf {
  background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.07);
  border-left:none; border-radius:0 9px 9px 0;
  padding:11px 12px; font-size:12px; color:#7EB8F7; font-weight:700;
  font-family:Georgia,serif; white-space:nowrap;
}
.typed-input, .form-select {
  flex:1; background:rgba(10,31,61,0.8); color:#F0EDE8;
  border:1px solid rgba(255,255,255,0.07);
  border-left:none; border-right:none;
  padding:11px 10px; font-size:16px; font-weight:700;
  font-family:Georgia,serif; outline:none; text-align:center; width:100%;
  -webkit-appearance:none; -moz-appearance:textfield;
}
.form-select { border-left:1px solid rgba(91,155,213,0.3); border-right:1px solid rgba(91,155,213,0.3); border-radius:9px; padding:11px 12px; text-align:left; font-size:14px; font-weight:400; }
.typed-input:focus { background:rgba(10,31,61,0.95); }
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
input[type=number] { -moz-appearance:textfield; }
.form-hint { font-size:10px; color:rgba(240,237,232,0.25); margin-top:4px; font-style:italic; }
.icon-grid { display:grid; grid-template-columns:repeat(8,1fr); gap:6px; margin-top:6px; }
.icon-opt { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:6px; text-align:center; cursor:pointer; font-size:18px; transition:all 0.15s; }
.icon-opt.selected, .icon-opt:hover { background:rgba(255,255,255,0.05); border-color:#7EB8F7; }
.modal-btns { display:flex; gap:10px; margin-top:18px; }
.btn-save {
  flex:1; padding:13px; border:none; border-radius:10px; cursor:pointer;
  background:#2D6BC4; color:#FFFFFF;
  font-size:15px; font-weight:700; font-family:Georgia,serif;
}
.btn-cancel {
  flex:0.5; padding:13px; border:1px solid rgba(255,255,255,0.15); border-radius:10px;
  cursor:pointer; background:transparent; color:rgba(240,237,232,0.5);
  font-size:14px; font-family:Georgia,serif;
}

/* SECTION CARD */
.section-card { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.07); border-radius:12px; padding:16px; margin-bottom:12px; }
.section-title { font-size:13px; font-weight:700; color:#7EB8F7; margin-bottom:12px; }

/* RESULT BOX */
.result-box { background:linear-gradient(135deg,rgba(26,107,60,0.3),rgba(10,61,61,0.5)); border:1px solid rgba(76,175,80,0.4); border-radius:12px; padding:18px; text-align:center; margin-top:12px; }
.result-lbl { font-size:10px; color:rgba(240,237,232,0.4); letter-spacing:2px; text-transform:uppercase; margin-bottom:5px; }
.result-val { font-size:clamp(28px,6vw,42px); font-weight:700; color:#4CAF50; }
.result-sub { font-size:12px; color:rgba(240,237,232,0.45); margin-top:5px; }
.result-sub2 { font-size:12px; color:#7EB8F7; margin-top:3px; }

/* INPUT GROUP (projections/lumpsum) */
.ig { margin-bottom:13px; }
.ig-label { font-size:11px; color:rgba(240,237,232,0.45); margin-bottom:6px; display:block; letter-spacing:0.5px; }
.ig-hint { font-size:10px; color:rgba(240,237,232,0.25); margin-top:4px; font-style:italic; }

/* TOGGLE */
.toggle-btn { padding:9px 18px; border-radius:20px; border:1px solid rgba(255,255,255,0.12); background:rgba(91,155,213,0.1); color:#7EB8F7; cursor:pointer; font-size:12px; font-family:Georgia,serif; transition:all 0.2s; }
.toggle-btn.off { border-color:rgba(255,255,255,0.15); background:transparent; color:rgba(240,237,232,0.35); }

/* MILESTONE */
.ms-wrap { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:12px; overflow:hidden; margin-top:10px; }
.ms-hdr { padding:11px 13px; border-bottom:1px solid rgba(255,255,255,0.08); font-weight:700; color:#7EB8F7; font-size:12px; }
.ms-row { display:flex; justify-content:space-between; align-items:center; padding:10px 13px; border-bottom:1px solid rgba(255,255,255,0.05); flex-wrap:wrap; gap:5px; }
.ms-row.hl { background:rgba(91,155,213,0.08); }
.ms-yr { color:rgba(240,237,232,0.55); font-size:12px; }
.ms-vals { display:flex; gap:18px; }
.mv { text-align:right; }
.mv-l { font-size:9px; color:rgba(240,237,232,0.28); }
.mv-n { font-size:13px; font-weight:600; }

/* LUMP ITEMS */
.lump-item { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:10px; padding:11px 13px; margin-bottom:7px; }
.lump-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; flex-wrap:wrap; gap:4px; }
.lump-name { display:flex; align-items:center; gap:6px; font-size:12px; }
.lump-cagr { font-size:10px; color:rgba(240,237,232,0.33); }

/* RISK */
.risk-sum { background:linear-gradient(135deg,rgba(20,30,48,0.6),rgba(10,31,61,0.8)); border:1px solid rgba(20,30,48,0.8); border-radius:12px; padding:16px; margin-bottom:10px; }
.risk-grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-top:8px; }
.ri { text-align:center; }
.ri .rv { font-size:20px; font-weight:700; }
.ri .rl { font-size:11px; color:rgba(240,237,232,0.55); margin-top:2px; }
.ri .rs { font-size:9px; color:rgba(240,237,232,0.33); }
.risk-card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-left:4px solid var(--rc); border-radius:10px; padding:13px; margin-bottom:9px; }
.rc-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:9px; flex-wrap:wrap; gap:5px; }
.risk-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; }
.rst { text-align:center; background:rgba(255,255,255,0.04); border-radius:7px; padding:7px 3px; }
.rst .rsl { font-size:9px; color:rgba(240,237,232,0.3); margin-bottom:2px; }
.rst .rsv { font-size:13px; font-weight:700; }
.insight { background:rgba(91,155,213,0.08); border:1px solid rgba(255,255,255,0.07); border-radius:12px; padding:13px; margin-top:4px; }
.insight-t { font-weight:700; color:#7EB8F7; margin-bottom:6px; font-size:13px; }
.insight-b { font-size:12px; color:rgba(240,237,232,0.65); line-height:1.6; }

/* STEPUP TABLE */
.su-table { width:100%; border-collapse:collapse; font-size:11px; margin-top:8px; }
.su-table th { background:rgba(20,30,48,0.9); color:#7EB8F7; padding:8px 6px; text-align:center; font-size:10px; }
.su-table td { padding:8px 6px; text-align:center; border-bottom:1px solid rgba(255,255,255,0.05); }
.su-table tr:nth-child(even) td { background:rgba(255,255,255,0.03); }

.footer { text-align:center; margin-top:22px; padding-top:12px; border-top:1px solid rgba(255,255,255,0.07); font-size:10px; color:rgba(240,237,232,0.18); line-height:1.6; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-sub">SIP Manager · Upstox · Age 22</div>
  <div class="hdr-title">My Investment Dashboard</div>
  <div class="hdr-desc" id="hdrDesc">Loading...</div>
</div>

<div class="stat-strip" id="statStrip"></div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('funds')">📋 Funds</button>
  <button class="tab" onclick="switchTab('proj')">📈 Projections</button>
  <button class="tab" onclick="switchTab('lump')">💰 Lump Sum</button>
  <button class="tab" onclick="switchTab('risk')">⚠️ Risk</button>
</div>

<div id="tabContent"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" style="display:none" onclick="closeModalOutside(event)">
  <div class="modal" id="modalBox">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modalTitle">Add Fund</div>
    <div id="modalBody"></div>
  </div>
</div>

<div class="footer">Educational only · Not SEBI-registered advice · Past performance ≠ future results</div>

<script>
// ── DEFAULT FUNDS ─────────────────────────────────────────────
const DEFAULT_FUNDS = [
  {id:1,name:"Parag Parikh Flexi Cap",type:"Flexi Cap",sip:2100,invested:1000,cagr:18.09,er:0.57,risk:"LOW",riskScore:1,rating:5,color:"#1A6B3C",icon:"🏆",tag:"ANCHOR",worstDrop:-29,recovery:"5 mo",notes:"#1 AUM · LOW risk · Best risk-adjusted fund"},
  {id:2,name:"MO S&P 500 Index Fund",type:"Global Index",sip:1400,invested:0,cagr:17.49,er:0.50,risk:"LOW-MED",riskScore:2,rating:4,color:"#0A3D3D",icon:"🌐",tag:"US CORE",worstDrop:-24,recovery:"14 mo",notes:"500 US companies · USD hedge · No Nasdaq overlap"},
  {id:3,name:"HDFC Nifty Midcap 150",type:"Mid Cap Index",sip:1050,invested:0,cagr:21.22,er:0.30,risk:"MED",riskScore:3,rating:4,color:"#5B9BD5",icon:"📈",tag:"GROWTH",worstDrop:-38,recovery:"18 mo",notes:"Replaces Nifty 50 · Nearly 2× CAGR · 0.30% ER"},
  {id:4,name:"Nippon India Large Cap",type:"Large Cap",sip:700,invested:1000,cagr:17.68,er:1.40,risk:"MED",riskScore:3,rating:5,color:"#5BA85B",icon:"🏢",tag:"INDIA CORE",worstDrop:-35,recovery:"12 mo",notes:"★★★★★ · Monitor high ER (1.40%)"},
  {id:5,name:"ICICI Pru Gold ETF",type:"Gold ETF",sip:560,invested:1879,cagr:10.0,er:0.50,risk:"LOW",riskScore:1,rating:3,color:"#8B6914",icon:"🥇",tag:"HEDGE ✅",worstDrop:-20,recovery:"36 mo",notes:"Crisis buffer · Rises when equity falls"},
  {id:6,name:"Bandhan Small Cap",type:"Small Cap",sip:490,invested:1000,cagr:23.53,er:0.90,risk:"HIGH",riskScore:5,rating:5,color:"#B22222",icon:"🚀",tag:"HIGH GROWTH",worstDrop:-55,recovery:"24 mo",notes:"Highest CAGR · Controlled at 7%"},
];

const ICONS = ["🏆","📈","🌐","🏢","🥇","🚀","💎","⭐","🎯","💼","🔥","📊","💡","🌟","🏦","💹","🛡️","⚡"];
const RISK_OPTS = ["LOW","LOW-MED","MED","HIGH"];
const RISK_COLORS = {LOW:{bg:"#EAF7EE",txt:"#1A6B3C"},["LOW-MED"]:{bg:"#EAF7F7",txt:"#0A3D3D"},MED:{bg:"#FFF8EC",txt:"#5BA85B"},HIGH:{bg:"#FDF0F0",txt:"#B22222"}};
const FUND_COLORS = ["#1A6B3C","#0A3D3D","#5B9BD5","#5BA85B","#8B6914","#B22222","#3D0A5C","#0A3D5C","#5C3D0A","#1A3D6B"];

// ── STATE ─────────────────────────────────────────────────────
let funds = [];
let activeTab = 'funds';
let projYears = 10;
let stepUpOn = true;
let lumpFund = 0;
let lumpAmount = 50000;
let lumpYears = 10;
let editingId = null;
let selectedIcon = "📈";
let nextId = 10;

// ── STORAGE ───────────────────────────────────────────────────
function saveFunds() {
  try { localStorage.setItem('sip_funds', JSON.stringify(funds)); } catch(e){}
}
function loadFunds() {
  try {
    const s = localStorage.getItem('sip_funds');
    if(s) { funds = JSON.parse(s); nextId = Math.max(...funds.map(f=>f.id))+1; }
    else { funds = JSON.parse(JSON.stringify(DEFAULT_FUNDS)); }
  } catch(e) { funds = JSON.parse(JSON.stringify(DEFAULT_FUNDS)); }
}

// ── CALC ──────────────────────────────────────────────────────
function calcSIP(m,cagr,yrs){
  const r=cagr/100/12,n=yrs*12;
  return m*((Math.pow(1+r,n)-1)/r)*(1+r);
}
function calcStepUp(m,cagr,yrs,su=0.10){
  let total=0;
  for(let y=0;y<yrs;y++){
    const mo=m*Math.pow(1+su,y),r=cagr/100/12;
    for(let i=0;i<12;i++) total+=mo*Math.pow(1+r,(yrs-y)*12-i);
  }
  return total;
}
function calcLump(amt,cagr,yrs){ return amt*Math.pow(1+cagr/100,yrs); }
function fmt(n){
  if(n>=10000000) return '₹'+(n/10000000).toFixed(2)+' Cr';
  if(n>=100000) return '₹'+(n/100000).toFixed(1)+'L';
  return '₹'+Math.round(n).toLocaleString('en-IN');
}
function stars(n){ return '★'.repeat(n)+'☆'.repeat(5-n); }
function getTotals(){
  const totalSIP = funds.reduce((s,f)=>s+f.sip,0);
  const blendedCAGR = totalSIP>0 ? funds.reduce((s,f)=>s+(f.cagr*f.sip/totalSIP),0) : 0;
  const blendedER = totalSIP>0 ? funds.reduce((s,f)=>s+(f.er*f.sip/totalSIP),0) : 0;
  return {totalSIP,blendedCAGR,blendedER};
}

// ── RENDER HEADER ─────────────────────────────────────────────
function renderHeader(){
  const {totalSIP,blendedCAGR,blendedER} = getTotals();
  const corpus10 = calcStepUp(totalSIP,blendedCAGR,10);
  const totalInvested = funds.reduce((s,f)=>s+(f.invested||0),0);
  document.getElementById('hdrDesc').textContent =
    `₹${totalSIP.toLocaleString('en-IN')}/month · ${funds.length} Funds · ${blendedCAGR.toFixed(1)}% Blended CAGR`;
  document.getElementById('statStrip').innerHTML = [
    {lbl:'Monthly SIP',val:'₹'+totalSIP.toLocaleString('en-IN'),sub:funds.length+' funds'},
    {lbl:'Total Invested',val:'₹'+totalInvested.toLocaleString('en-IN'),sub:'current value'},
    {lbl:'Blended CAGR',val:blendedCAGR.toFixed(1)+'%',sub:'weighted avg'},
    {lbl:'Blended ER',val:blendedER.toFixed(2)+'%',sub:'expense ratio'},
    {lbl:'10-Yr (Step-Up)',val:fmt(corpus10),sub:'10% annual'},
  ].map(s=>`<div class="stat-box"><div class="lbl">${s.lbl}</div><div class="val">${s.val}</div><div class="sub">${s.sub}</div></div>`).join('');
}

// ── TABS ──────────────────────────────────────────────────────
function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',['funds','proj','lump','risk'][i]===tab);
  });
  renderTab();

}
